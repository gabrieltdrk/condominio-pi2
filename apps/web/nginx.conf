server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for hashed static assets (Vite adds content hashes)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any path not matching a file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
